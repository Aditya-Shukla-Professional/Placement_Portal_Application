{% extends "base.html" %}
{% block title %}Placement Tracking{% endblock %}

{% block content %}
<div class="container mt-5">

    <h2 class="mb-4 text-center">Complete Placement Tracking</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered align-middle">

                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Company</th>
                            <th>Job</th>
                            <th>Status</th>
                            <th>Applied On</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for row in applications %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>{{ row[2] }}</td>
                            <td>{{ row[3] }}</td>
                            <td>{{ row[4] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>
{% endblock %}
