{% extends "base.html" %}
{% block title %}Placement Tracking{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4 text-center">Complete Placement Tracking</h2>

    <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Student</th>
                <th>Company</th>
                <th>Job</th>
                <th>Status</th>
                <th>Applied On</th>
            </tr>
        </thead>
        <tbody>
            {% for row in applications %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
