{% extends "base.html" %}

{% block title %}Post New Job{% endblock %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4 text-center">Post New Job</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-info">
                {% for message in messages %}
                    <div>{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Job Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Required Skills</label>
            <input type="text" name="skills" class="form-control" placeholder="Python, SQL, ML..." required>
        </div>

        <div class="mb-3">
            <label class="form-label">Experience Required</label>
            <input type="text" name="experience" class="form-control" placeholder="0-2 years" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Salary Range</label>
            <input type="text" name="salary" class="form-control" placeholder="5-8 LPA" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Application Deadline</label>
            <input type="date" name="deadline" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Post Job
        </button>

    </form>

    <div class="mt-3">
        <a href="{{ url_for('company_dashboard') }}" class="btn btn-secondary w-100">
            Back to Dashboard
        </a>
    </div>

</div>
{% endblock %}
